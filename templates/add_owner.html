{% extends 'base.html' %}

{% block title %}Add Owner - Horse Racing Management{% endblock %}

{% block content %}
    <h2>Add New Owner</h2>
    
    <form method="POST" style="max-width: 600px; margin-top: 30px;">
        <div class="form-group">
            <label for="name">Owner Name *</label>
            <input type="text" id="name" name="name" required placeholder="Enter owner name">
        </div>
        
        <div class="form-actions" style="margin-top: 30px;">
            <button type="submit" class="btn">Add Owner</button>
            <a href="{{ url_for('owners') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
{% endblock %}
