{% extends 'base.html' %}

{% block title %}Add Host - Horse Racing Management{% endblock %}

{% block content %}
    <h2>Add New Host</h2>
    
    <form method="POST" style="max-width: 600px; margin-top: 30px;">
        <div class="form-row">
            <div class="form-group" style="flex:1; margin-right:10px;">
                <label for="host_name">First Name *</label>
                <input type="text" id="host_name" name="host_name" required placeholder="Enter first name">
            </div>
            <div class="form-group" style="flex:1;">
                <label for="surname">Surname *</label>
                <input type="text" id="surname" name="surname" required placeholder="Enter surname">
            </div>
        </div>
        
        <div class="form-actions" style="margin-top: 30px;">
            <button type="submit" class="btn">Add Host</button>
            <a href="{{ url_for('hosts') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
{% endblock %}
