{% extends 'base.html' %}

{% block title %}Add Horse - Horse Racing Management{% endblock %}

{% block content %}
    <h2>Add New Horse</h2>
    
    <form method="POST" style="max-width: 600px; margin-top: 30px;">
        <div class="form-group">
            <label for="name">Horse Name *</label>
            <input type="text" id="name" name="name" required placeholder="Enter horse name">
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="host_id">Host *</label>
                <select id="host_id" name="host_id" required>
                    <option value="">Select host...</option>
                    {% for host in hosts %}
                        <option value="{{ host.id }}">{{ host.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="rating">Initial Rating</label>
                <input type="number" id="rating" name="rating" min="0" max="10" step="0.1" value="5.0" placeholder="5.0">
            </div>
        </div>
        
        <div class="form-actions" style="margin-top: 30px;">
            <button type="submit" class="btn">Add Horse</button>
            <a href="{{ url_for('horses') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
    
    {% if not hosts %}
        <div class="alert alert-info" style="margin-top: 20px;">
            <strong>Note:</strong> You need to <a href="{{ url_for('add_host') }}">add a host first</a> before creating a horse.
        </div>
    {% endif %}
{% endblock %}
