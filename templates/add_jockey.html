{% extends 'base.html' %}

{% block title %}Add Jockey - Horse Racing Management{% endblock %}

{% block content %}
    <h2>Add New Jockey</h2>
    
    <form method="POST" style="max-width: 600px; margin-top: 30px;">
        <div class="form-group">
            <label for="name">Jockey Name *</label>
            <input type="text" id="name" name="name" required placeholder="Enter jockey name">
        </div>
        
        <div class="form-group">
            <label for="rating">Initial Rating</label>
            <input type="number" id="rating" name="rating" min="0" max="10" step="0.1" value="5.0" placeholder="5.0">
        </div>
        
        <div class="form-actions" style="margin-top: 30px;">
            <button type="submit" class="btn">Add Jockey</button>
            <a href="{{ url_for('jockeys') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
{% endblock %}
