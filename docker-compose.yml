version: '3.8'

services:
  web:
    build: .
    image: horse_races_web:latest
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/horse_races
    depends_on:
      - db
    networks:
      - webnet

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: horse_races
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - webnet

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - webnet

volumes:
  db_data:

networks:
  webnet:
    driver: bridge
